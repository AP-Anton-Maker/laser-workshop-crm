# Nginx configuration for Anton Maker CRM
# Place in /etc/nginx/sites-available/anton-maker

server {
    listen 80;
    server_name anton-maker.ru www.anton-maker.ru;
    
    # Logging
    access_log /var/log/nginx/anton-maker-access.log;
    error_log /var/log/nginx/anton-maker-error.log;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Favicon
    location = /favicon.ico { 
        access_log off; 
        log_not_found off; 
    }
    
    # Static files
    location /static/ {
        alias /opt/anton-maker/data/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Media files
    location /media/ {
        alias /opt/anton-maker/data/media/;
        expires 7d;
    }
    
    # Gunicorn proxy
    location / {
        include proxy_params;
        proxy_pass http://unix:/opt/anton-maker/gunicorn.sock;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Health check endpoint
    location /health/ {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

