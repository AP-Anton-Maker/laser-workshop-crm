services:
  web:
    build: .
    command: ./entrypoint.sh
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    env_file: .env
    restart: unless-stopped
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/app/data:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks: [app-net]
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  app-net:
    driver: bridge
